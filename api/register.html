<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6fb;
            text-align: center;
            padding: 40px;
        }

        .form-box {
            background: white;
            padding: 30px;
            width: 350px;
            margin: auto;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            padding: 10px 20px;
            background: #4a69bd;
            color: white;
            border: none;
            cursor: pointer;
        }

        #result {
            margin-top: 20px;
            font-weight: bold;
            color: green;
        }
    </style>
</head>
<body>

<div class="form-box">
    <h2>Register</h2>

    <form id="registerForm">
        <input type="email" id="email" placeholder="Email" required><br>
        <input type="text" id="first_name" placeholder="First Name" required><br>
        <input type="text" id="last_name" placeholder="Last Name" required><br>
        <button type="submit">Register</button>
    </form>

    <div id="result"></div>
</div>

<script>
document.getElementById("registerForm").addEventListener("submit", function(e) {
    e.preventDefault();

    fetch("register.php", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            email: document.getElementById("email").value,
            first_name: document.getElementById("first_name").value,
            last_name: document.getElementById("last_name").value
        })
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            document.getElementById("result").innerHTML =
                "Registration successful!<br>Your token: <b>" + data.auth_token + "</b>";

            // Store token locally
            localStorage.setItem("auth_token", data.auth_token);
        } else {
            document.getElementById("result").innerHTML = "Registration failed.";
        }
    })
    .catch(error => {
        console.error("Error:", error);
    });
});
</script>

</body>
</html>
